<text class="title" x="16" y="24">Package manager popularity over time, weighted by package count</text><text class="subtitle" x="16" y="42">5/13/2026 – 5/13/2026</text><g class="y-ticks"><line class="axis" x1="64" y1="425" x2="718" y2="425" /><text class="tick" x="52" y="425" dominant-baseline="middle" text-anchor="end">0%</text><line class="axis" x1="64" y1="336.75" x2="718" y2="336.75" /><text class="tick" x="52" y="336.75" dominant-baseline="middle" text-anchor="end">20%</text><line class="axis" x1="64" y1="248.5" x2="718" y2="248.5" /><text class="tick" x="52" y="248.5" dominant-baseline="middle" text-anchor="end">40%</text><line class="axis" x1="64" y1="160.25" x2="718" y2="160.25" /><text class="tick" x="52" y="160.25" dominant-baseline="middle" text-anchor="end">60%</text><line class="axis" x1="64" y1="72" x2="718" y2="72" /><text class="tick" x="52" y="72" dominant-baseline="middle" text-anchor="end">80%</text></g><g class="x-ticks"><text class="tick" x="64" y="443" text-anchor="middle">5/13/2026</text></g><g class="series-group"><g class="series" data-key="pnpm"><polyline fill="none" stroke="#f9ad00" stroke-width="3" points="64,109.79068444155422" /><circle cx="64" cy="109.79068444155422" r="4" fill="#f9ad00" /></g><g class="series" data-key="yarn_modern"><polyline fill="none" stroke="#7c6ff6" stroke-width="3" points="64,385.12896277028125" /><circle cx="64" cy="385.12896277028125" r="4" fill="#7c6ff6" /></g><g class="series" data-key="npm"><polyline fill="none" stroke="#ea2039" stroke-width="3" points="64,394.46902942610956" /><circle cx="64" cy="394.46902942610956" r="4" fill="#ea2039" /></g><g class="series" data-key="yarn_classic"><polyline fill="none" stroke="#2c8ebb" stroke-width="3" points="64,396.4632986506259" /><circle cx="64" cy="396.4632986506259" r="4" fill="#2c8ebb" /></g><g class="series" data-key="bun"><polyline fill="none" stroke="#f472b6" stroke-width="3" points="64,400.652698748171" /><circle cx="64" cy="400.652698748171" r="4" fill="#f4